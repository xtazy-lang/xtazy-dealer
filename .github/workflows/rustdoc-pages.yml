name: Rustdoc Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: rustdoc-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Rustdoc
        run: cargo doc -p xtazy-dealer --no-deps --document-private-items

      - name: Prepare Pages artifact
        run: |
          cat > target/doc/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=dealer/">
              <title>dealer docs</title>
            </head>
            <body>
              <p><a href="dealer/">Open dealer Rustdoc</a></p>
            </body>
          </html>
          HTML
          echo "docs.dealer.xtazy.dev" > target/doc/CNAME
          touch target/doc/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
